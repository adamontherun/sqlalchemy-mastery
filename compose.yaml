services:
  db:
    image: postgres:17
    container_name: sqlalchemy-course-db
    environment:
      POSTGRES_USER: course
      POSTGRES_PASSWORD: course
      POSTGRES_DB: course
    ports:
      - "5439:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U course -d course"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  pgdata:

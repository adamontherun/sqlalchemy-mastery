[project]
name = "sqlalchemy-course"
version = "0.1.0"
description = "SQLAlchemy Mastery — a hands-on course on modern SQLAlchemy"
requires-python = ">=3.13"
dependencies = [
    "sqlalchemy[asyncio]>=2.0.51,<2.1",
    "psycopg[binary]>=3.2",
    "asyncpg>=0.30",
    "alembic>=1.16",
    "fastapi>=0.115",
    "uvicorn>=0.34",
    "pydantic>=2.10",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=1.0",
    "httpx>=0.28",
    "ruff>=0.8",
    "mypy>=1.13",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["challenges"]

[tool.ruff]
target-version = "py313"
line-length = 100
# Alembic templates and autogenerates these; they follow Alembic's own
# formatting conventions, not this course's, and re-wrapping an
# autogenerated migration by hand defeats the point of autogenerate.
extend-exclude = ["examples/ch09/migration_project/migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.lint.per-file-ignores]
# Challenge skeletons intentionally raise NotImplementedError as their only
# body and leave imported names/locals unused until a learner fills them in.
"challenges/*/challenge.py" = ["F401", "F841", "ARG001"]

[tool.mypy]
python_version = "3.13"
plugins = ["sqlalchemy.ext.mypy.plugin"]
warn_unused_ignores = true
warn_redundant_casts = true
# Challenge skeletons are intentionally incomplete (raise NotImplementedError)
# until a learner fills them in, so checking them isn't meaningful — and
# every challenges/chNN/challenge.py shares the same module name with no
# __init__.py, which mypy refuses to scan together anyway. Alembic's own
# generated migration files follow Alembic's conventions, not ours, same as
# the ruff exclusion above.
exclude = ["^challenges/", "^examples/ch09/migration_project/migrations/"]

[tool.uv]
package = false

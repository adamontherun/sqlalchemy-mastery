# Deploys the book/ directory to GitHub Pages on every push to main.
#
# One-time setup after this workflow is committed: in the repo's Settings →
# Pages, set "Source" to "GitHub Actions" (not "Deploy from a branch"). No
# other configuration needed — this workflow handles the rest.
name: Deploy course book to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: book
      - id: deployment
        uses: actions/deploy-pages@v4
